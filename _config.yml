title: "Fiber & Thread"
description: "A fiber art blog — weaving, knitting, embroidery, and everything in between."
baseurl: ""
url: ""

# Change these two lines to match your GitHub username and repo name
# Example: if your repo is github.com/janedoe/fiber-blog
#   github_username: janedoe
#   repository: fiber-blog
github_username: rhiannasfiberarts
repository: website

# Author info (shown in footer)
author:
  name: "Rhianna Lucas"
  bio: "Fiber artist making things with fiber, one stitch at a time."

# Jekyll settings
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
